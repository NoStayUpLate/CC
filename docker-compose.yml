# 生产形态 compose（轻量化版本）：frontend(nginx + 静态托管) → backend(FastAPI + DuckDB)
#
# 与早期版本相比已瘦身：
#   - 去掉 ClickHouse 容器（改用 DuckDB 嵌入式，省 600MB+ 内存）
#   - 去掉 Caddy 反代（HTTP-only 模式下 nginx 已经在 :80 提供 /api 反代）
#   - backend 镜像默认不装 Playwright 浏览器二进制（生产节点跨境抓不到，留给本地/海外节点）
#
# 上云步骤：
#   1. 准备 .env.production（复制 .env.production.example，填 JWT_SECRET 等）
#   2. docker compose --env-file .env.production up -d --build
#   3. 浏览器访问 http://<服务器公网IP>
#
# 需要在容器里跑爬虫（海外节点）：
#   docker compose --env-file .env.production build --build-arg INSTALL_PLAYWRIGHT_CHROMIUM=true backend
#   docker compose --env-file .env.production up -d backend
#
# DuckDB 数据库：
#   挂在 duckdb_data 卷，容器内路径 /data/dashboard.duckdb；删卷 = 清库

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        INSTALL_PLAYWRIGHT_CHROMIUM: ${INSTALL_PLAYWRIGHT_CHROMIUM:-false}
    container_name: novel_backend
    restart: unless-stopped
    environment:
      DUCKDB_PATH:         /data/dashboard.duckdb
      SCRAPER_HEADLESS:    "true"
      # 鉴权
      AUTH_BACKEND:        ${AUTH_BACKEND:-file}
      AUTH_USERS:          ${AUTH_USERS:-}
      AUTH_SQLITE_PATH:    /data/auth_users.db
      JWT_SECRET:          ${JWT_SECRET}
      JWT_EXPIRE_HOURS:    ${JWT_EXPIRE_HOURS:-8}
      # COOKIE_SECURE 必须与传输协议匹配：HTTPS=true（默认）/ HTTP=false
      COOKIE_SECURE:       ${COOKIE_SECURE:-true}
      COOKIE_SAMESITE:     ${COOKIE_SAMESITE:-lax}
      REGISTRATION_CODE:   ${REGISTRATION_CODE:-}
      # 定时任务：跨境抓不到时建议关闭，避免空跑烧 CPU
      SCHEDULE_ENABLED:    ${SCHEDULE_ENABLED:-false}
      SCHEDULE_HOUR:       ${SCHEDULE_HOUR:-2}
    volumes:
      - backend_data:/data    # SQLite 用户库 + DuckDB 库一起持久化
    expose:
      - "8000"                # 仅 compose 内网开放
    networks:
      - app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: novel_frontend
    restart: unless-stopped
    ports:
      - "80:80"               # nginx 直接暴露到宿主 80（HTTP-only 模式不需要 Caddy 这一层）
    depends_on:
      - backend
    networks:
      - app

volumes:
  backend_data:                # SQLite 用户库 + DuckDB 数据文件 都在这一个卷里

networks:
  app:
    driver: bridge

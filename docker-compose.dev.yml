# 本地 dev override：与 docker-compose.yml 叠加使用
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# 改动：
#   - 后端暴露 8000 到宿主机，方便本地直接 curl
#   - 前端改回 vite dev（HMR），不走 nginx 镜像
#   - COOKIE_SECURE=false（HTTP 下浏览器才接受 cookie）

services:
  backend:
    # dev 容器需要装 Chromium 才能跑爬虫
    build:
      args:
        INSTALL_PLAYWRIGHT_CHROMIUM: "true"
    ports:
      - "8000:8000"
    environment:
      COOKIE_SECURE: "false"
    volumes:
      - ./backend:/app
      - backend_data:/data
    command: ["uvicorn", "main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    image: node:20-alpine
    container_name: novel_frontend_dev
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    expose: !reset []
